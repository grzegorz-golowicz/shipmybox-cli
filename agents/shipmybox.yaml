name: shipmybox
description: >
  Retrieve real-time delivery information from a ShipMyBox account.
  ShipMyBox is a service that provides Polish warehouse addresses for forwarding
  packages to Malta. Use this skill to fetch unique shipping codes, warehouse
  addresses, and parcel statuses without opening a browser.
version: "0.1.0"

# Prerequisites
#   - Python >=3.9
#   - Install: uv tool install git+https://github.com/grzegorz-golowicz/shipmybox-cli
#   - Or run without installing: uvx --from git+https://github.com/grzegorz-golowicz/shipmybox-cli shipmybox <command>
#   - Authentication: run the `shipmybox_login` tool once; the session is stored in
#     ~/.config/shipmybox/session.json and reused by subsequent calls.

tools:
  - name: shipmybox_login
    description: >
      Authenticate with ShipMyBox and persist the session cookie to
      ~/.config/shipmybox/session.json. Must be called at least once before
      using shipmybox_info or shipmybox_parcels.
    command: shipmybox login
    parameters:
      - name: email
        type: string
        description: ShipMyBox account email address.
        required: true
        flag: "--email"
      - name: password
        type: string
        description: ShipMyBox account password.
        required: true
        sensitive: true
        flag: "--password"

  - name: shipmybox_info
    description: >
      Return the user's unique Customer ID, Alternative ID, primary warehouse
      shipping address, and alternative shipping address. Requires an active
      session (call shipmybox_login first).
    command: shipmybox info
    parameters:
      - name: json
        type: boolean
        description: >
          When true, output is returned as a JSON object with keys:
          customer_id, alternative_id, shipping_address, alternative_address.
        required: false
        default: false
        flag: "--json"

  - name: shipmybox_parcels
    description: >
      List all parcels associated with the account, including dimensions,
      weight, status, price (EUR), and payment status. Requires an active
      session (call shipmybox_login first).
    command: shipmybox parcels
    parameters:
      - name: json
        type: boolean
        description: >
          When true, output is a JSON array. Each element has keys:
          number, length_cm, width_cm, height_cm, weight_kg, status,
          price_eur, payment_status.
        required: false
        default: false
        flag: "--json"
      - name: last
        type: boolean
        description: >
          When true, return only the most recently added parcel instead of
          the full list.
        required: false
        default: false
        flag: "--last"
